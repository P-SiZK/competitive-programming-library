assets:
  self_host:
    enabled: null
    env: null
avatar: https://avatars.githubusercontent.com/u/54477535
baseurl: ''
collections:
  tabs:
    output: true
    sort_by: order
comments:
  active: null
  disqus:
    shortname: null
  giscus:
    category: null
    category_id: null
    input_position: null
    lang: null
    mapping: null
    reactions_enabled: null
    repo: null
    repo_id: null
  utterances:
    issue_term: null
    repo: null
compress_html:
  blanklines: false
  clippings: all
  comments: all
  endings: all
  ignore:
    envs:
    - development
  profile: false
defaults:
- scope:
    path: ''
    type: posts
  values:
    comments: true
    layout: post
    permalink: /posts/:title/
    toc: true
- scope:
    path: _drafts
  values:
    comments: false
- scope:
    path: ''
    type: tabs
  values:
    layout: page
    permalink: /:title/
- scope:
    path: assets/img/favicons
  values:
    swcache: true
- scope:
    path: assets/js/dist
  values:
    swcache: true
description: This documentation is automatically generated by online-judge-tools/verification-helper
exclude:
- '*.gem'
- '*.gemspec'
- tools
- README.md
- CHANGELOG.md
- LICENSE
- rollup.config.js
- node_modules
- package*.json
github:
  username: P-SiZK
google_analytics:
  id: null
google_site_verification: null
img_cdn: null
jekyll-archives:
  enabled:
  - categories
  - tags
  layouts:
    category: category
    tag: tag
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true
      start_line: 1
    css_class: highlight
    span:
      line_numbers: false
lang: ja
paginate: 10
plugins:
- jemoji
- jekyll-redirect-from
pwa:
  enabled: true
sass:
  style: compressed
social:
  links:
  - https://github.com/P-SiZK
  name: SiZK
tagline: null
theme: jekyll-theme-chirpy
theme_mode: null
timezone: Asia/Tokyo
title: SiZK's Library
toc: true
twitter:
  username: P_SiZK
url: https://p-sizk.github.io/competitive-programming-library/
